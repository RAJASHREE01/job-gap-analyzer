services:
  - type: web
    name: job-gap-analyzer-api
    env: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: SCHEDULE_FILE_PATH
        value: /tmp/schedule_config.json
      - key: PYTHONIOENCODING
        value: utf-8
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: CRON_SECRET
        sync: false

  - type: cron
    name: job-gap-analyzer-cron
    env: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install httpx
    schedule: "30 1 * * *"   # 07:00 IST = 01:30 UTC
    startCommand: >-
      python -c "
      import httpx, os, sys;
      url = os.environ['API_BASE_URL'].rstrip('/') + '/run-scheduled';
      secret = os.environ.get('CRON_SECRET', '');
      r = httpx.post(url, headers={'x-cron-secret': secret}, timeout=300);
      print(r.status_code, r.text);
      sys.exit(0 if r.is_success else 1)
      "
    envVars:
      - key: API_BASE_URL
        sync: false
      - key: CRON_SECRET
        sync: false
