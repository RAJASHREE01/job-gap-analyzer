services:
  - type: web
    name: job-gap-analyzer-api
    env: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: SCHEDULE_FILE_PATH
        value: /tmp/schedule_config.json
      - key: PYTHONIOENCODING
        value: utf-8
      - key: ALLOWED_ORIGINS
        value: "*"

  - type: cron
    name: job-gap-analyzer-cron
    env: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -q httpx
    schedule: "30 1 * * *"   # 07:00 IST = 01:30 UTC
    startCommand: python run_cron.py
