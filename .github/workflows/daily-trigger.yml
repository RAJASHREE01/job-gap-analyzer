name: Daily Job Alert

on:
  schedule:
    - cron: "30 12 * * *"  # 12:30 UTC = 06:00 PM IST
  workflow_dispatch:        # manual trigger button in GitHub UI

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger job analysis
        run: |
          curl -f -X POST https://job-gap-analyzer-api.onrender.com/run-scheduled \
            --retry 5 --retry-delay 40 --retry-all-errors
